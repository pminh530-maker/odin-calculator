<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Basic Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calc-frame">

        <div class="display">0</div>

        <div class="panel-container">
            <div class="number-panel">
                <button class="number">0</button>
                <button class="number">1</button>
                <button class="number">2</button>
                <button class="number">3</button>
                <button class="number">4</button>
                <button class="number">5</button>
                <button class="number">6</button>
                <button class="number">7</button>
                <button class="number">8</button>
                <button class="number">9</button>
            </div>

            <div class="operate-panel">
                <button class="operator">+</button>
                <button class="operator">-</button>
                <button class="operator">x</button>
                <button class="operator">÷</button>
                <button id="decimalBtn">.</button>
                <button id="executeBtn">=</button>
                <button id="clearBtn">AC</button>
                <button id="backspaceBtn">⌫</button>
            </div>
        </div>
    <div class="footer"> powered by Phuc Tong</div>
    </div>
    <script defer src="javascript.js"></script>
</body>
</html>
